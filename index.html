<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laboratorio MRU</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  text-align: center;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 { color: #0d47a1; }

input {
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 80px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #1976d2;
  color: white;
  cursor: pointer;
}

button:hover { background: #0d47a1; }

canvas {
  margin-top: 20px;
  border-radius: 12px;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>🚗 Laboratorio MRU</h2>

Distancia (m):
<input id="dist" type="number" value="20" oninput="draw()">

Velocidad (m/s):
<input id="vel" type="number" value="5">

<br><br>

<button onclick="start()">▶ Iniciar</button>
<button onclick="pause()">⏸ Pausar</button>
<button onclick="reset()">🔁 Reiniciar</button>

<p id="info"></p>

</div>

<canvas id="sim" width="1100" height="300"></canvas>

</div>

<script>

let t = 0;
let running = false;

let car = new Image();
car.src = "carro.png";

car.onload = function(){
  draw();
};

// ESCALA
let metros_max = 100;
let ancho_px = 1100;
let escala = ancho_px / metros_max;

// CARRO
let largo_auto_m = 4.5;
let ancho_auto_px = largo_auto_m * escala * 1.3;
let alto_auto_px = 30;

// MARGEN
let margen = 120;

function start(){
  running = true;
  loop();
}

function pause(){
  running = false;
}

function reset(){
  t = 0;
  running = false;
  draw();
}

function loop(){
  if(!running) return;

  let d = parseFloat(dist.value);
  let v = parseFloat(vel.value);

  let t_esperado = d / v;

  if(t <= t_esperado){
    t += 0.05;
  }

  draw();
  requestAnimationFrame(loop);
}

function draw(){

  let ctx = sim.getContext("2d");

  let d = parseFloat(dist.value);
  let v = parseFloat(vel.value);

  let t_esperado = d / v;
  let t_real = Math.min(t, t_esperado);

  let meta = d * escala + margen;

  let x_frente = v * t_real * escala + margen;
  let x = x_frente - ancho_auto_px;

  ctx.clearRect(0,0,1100,300);

  // Cielo
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0,0,1100,180);

  // Suelo
  ctx.fillStyle = "#2e7d32";
  ctx.fillRect(0,180,1100,120);

  // Carretera
  ctx.fillStyle = "#424242";
  ctx.fillRect(0,200,1100,80);

  // Línea discontinua
  ctx.strokeStyle = "white";
  ctx.setLineDash([20,15]);
  ctx.beginPath();
  ctx.moveTo(0,240);
  ctx.lineTo(1100,240);
  ctx.stroke();
  ctx.setLineDash([]);

  // META
  ctx.strokeStyle = "yellow";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(meta,200);
  ctx.lineTo(meta,280);
  ctx.stroke();

  ctx.fillStyle = "black";
  ctx.fillText("META", meta - 20, 195);

  // CARRO
  if(car.complete){
    ctx.drawImage(car, x, 210 - alto_auto_px, ancho_auto_px, alto_auto_px);
  }

  // 🖥️ PANTALLA DIGITAL
  let panel_x = 850;
  let panel_y = 20;
  let panel_w = 220;
  let panel_h = 80;

  ctx.fillStyle = "black";
  ctx.fillRect(panel_x, panel_y, panel_w, panel_h);

  ctx.strokeStyle = "#39ff14";
  ctx.lineWidth = 2;
  ctx.strokeRect(panel_x, panel_y, panel_w, panel_h);

  ctx.fillStyle = "#39ff14";
  ctx.font = "28px monospace";
  ctx.textAlign = "center";

  let tiempo_txt = t_real.toFixed(2) + " s";

  ctx.fillText(
    tiempo_txt,
    panel_x + panel_w/2,
    panel_y + panel_h/2 + 10
  );

}

</script>

</body>
</html>
